services:
  mongo:
    image: mongo:7
    command: ["--quiet"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  test:
    build:
      context: ./backend
    environment:
      - MONGODB_URI=mongodb://mongo:27017/game_db
    depends_on:
      mongo:
        condition: service_healthy
    command: ["pytest", "-n", "auto"]

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/game_db
    depends_on:
      test:
        condition: service_completed_successfully
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo-data:
