services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  test:
    build:
      context: ./backend
    environment:
      - MONGODB_URI=mongodb://mongo:27017/game_db
    depends_on:
      - mongo
    command: ["pytest", "-n", "auto"]

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/game_db
    depends_on:
      test:
        condition: service_completed_successfully
      mongo:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo-data:
